<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8">
  <link rel="icon" type="image/png" href="favicon.png">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Periodeplan-builder – barnehagekassa.no</title>

  <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', Arial, sans-serif; background: #f5f2ed; color: #1a1a1a; min-height: 100vh; }
    .site-header { background: white; padding: 14px 32px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid #e8e3db; }
    .site-header img { height: 44px; width: auto; display: block; }
    nav { display: flex; gap: 24px; align-items: center; }
    nav a { color: #444; text-decoration: none; font-size: 0.92rem; font-weight: 500; transition: color 0.15s; }
    nav a:hover { color: #3d7272; }
    .page-hero { background: #3d7272; color: white; padding: 52px 32px 44px; text-align: center; }
    .page-hero h1 { font-size: 2rem; font-weight: 900; font-family: 'Quicksand', 'Segoe UI', Arial, sans-serif; margin-bottom: 10px; }
    .page-hero p { color: rgba(255,255,255,0.90); font-size: 1rem; max-width: 520px; margin: 0 auto; line-height: 1.6; }
    .page { max-width: 860px; margin: 0 auto; padding: 40px 24px 80px; }
    .card { background: white; border-radius: 16px; border: 1px solid #e8e3db; padding: 28px; margin-bottom: 24px; }
    .btn { display: inline-block; padding: 11px 26px; border-radius: 100px; font-size: 0.92rem; font-weight: 700; border: none; cursor: pointer; transition: transform 0.15s, box-shadow 0.15s; text-decoration: none; }
    .btn-primary { background: #3d7272; color: white; }
    .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(61,114,114,0.25); }
    .btn-secondary { background: #f5f2ed; color: #3d7272; border: 1.5px solid #e8e3db; }
    .btn-secondary:hover { background: #e4f2f2; }
    .btn-accent { background: #d97035; color: white; }
    .btn-accent:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(217,112,53,0.25); }
    label { display: block; font-size: 0.82rem; font-weight: 700; color: #666; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px; }
    select, input[type=text], textarea { width: 100%; padding: 10px 14px; border: 1.5px solid #e8e3db; border-radius: 10px; font-size: 0.95rem; font-family: inherit; background: white; color: #1a1a1a; outline: none; transition: border-color 0.15s; }
    select:focus, input:focus, textarea:focus { border-color: #3d7272; }
    footer { text-align: center; padding: 28px; font-size: 0.8rem; color: #bbb; border-top: 1px solid #e8e3db; }
  </style>

  <style>
    @media print {
      .site-header, .page-hero, .skjema-seksjon, footer, .knapp-rad { display: none !important; }
      body { background: white; padding: 0; }
      .plan-preview { display: block !important; box-shadow: none; border: none; padding: 0; }
    }
    .to-kol { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
    @media (max-width: 600px) { .to-kol { grid-template-columns: 1fr; } }
    .form-gruppe { margin-bottom: 18px; }
    .ramme-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .ramme-item { display: flex; align-items: center; gap: 8px; font-size: 0.88rem; cursor: pointer; padding: 6px 0; }
    .ramme-item input { width: auto; flex-shrink: 0; }
    .aktivitet-rad { display: flex; gap: 10px; margin-bottom: 8px; align-items: flex-start; }
    .aktivitet-rad textarea { flex: 1; min-height: 54px; padding: 8px 12px; border: 1.5px solid #e8e3db; border-radius: 10px; font-size: 0.9rem; font-family: inherit; resize: vertical; }
    .aktivitet-rad textarea:focus { border-color: #3d7272; outline: none; }
    .fjern-btn { background: none; border: none; color: #ccc; cursor: pointer; font-size: 1.1rem; padding: 8px; flex-shrink: 0; }
    .fjern-btn:hover { color: #e07070; }
    .plan-preview { display: none; background: white; border-radius: 16px; border: 1px solid #e8e3db; padding: 36px; margin-top: 24px; }
    .preview-header { border-bottom: 3px solid #3d7272; padding-bottom: 16px; margin-bottom: 24px; }
    .preview-tittel { font-size: 1.6rem; font-weight: 900; font-family: 'Quicksand','Segoe UI',Arial,sans-serif; color: #2a5252; }
    .preview-meta { font-size: 0.88rem; color: #888; margin-top: 4px; }
    .preview-seksjon { margin-bottom: 20px; }
    .preview-seksjon h3 { font-size: 0.78rem; font-weight: 700; color: #3d7272; text-transform: uppercase; letter-spacing: 0.6px; margin-bottom: 10px; padding-bottom: 4px; border-bottom: 1px solid #e4f2f2; }
    .preview-seksjon p { font-size: 0.93rem; line-height: 1.7; color: #333; }
    .preview-seksjon ul { list-style: disc; padding-left: 20px; }
    .preview-seksjon ul li { font-size: 0.93rem; color: #333; padding: 3px 0; }
    .ramme-tags { display: flex; flex-wrap: wrap; gap: 6px; }
    .ramme-tag { display: inline-block; padding: 4px 12px; background: #e4f2f2; color: #2a5252; border-radius: 100px; font-size: 0.78rem; font-weight: 700; }
    .knapp-rad { display: flex; gap: 12px; flex-wrap: wrap; margin-top: 8px; }
  </style>
</head>

<div class="page-hero">
  <h1>Periodeplan-builder</h1>
  <p>Fyll inn feltene og generer en ferdig formatert periodeplan som kan skrives ut eller deles med teamet.</p>
</div>
<div class="page">
  <div class="card skjema-seksjon">
    <div class="to-kol">
      <div class="form-gruppe">
        <label>Tema</label>
        <input type="text" id="tema" placeholder="f.eks. Havet">
      </div>
      <div class="form-gruppe">
        <label>Avdeling</label>
        <input type="text" id="avdeling" placeholder="f.eks. Blåbær">
      </div>
      <div class="form-gruppe">
        <label>Periode fra</label>
        <input type="text" id="fraDato" placeholder="f.eks. 6. januar">
      </div>
      <div class="form-gruppe">
        <label>Periode til</label>
        <input type="text" id="tilDato" placeholder="f.eks. 24. januar">
      </div>
    </div>

    <div class="form-gruppe">
      <label>Overordnet mål for perioden</label>
      <textarea id="maal" rows="3" placeholder="Beskriv hva dere vil at barna skal oppleve, lære og utforske i denne perioden..."></textarea>
    </div>

    <div class="form-gruppe">
      <label>Rammeplankoblinger</label>
      <div class="ramme-grid" id="rammeGrid"></div>
    </div>

    <div class="form-gruppe">
      <label>Planlagte aktiviteter</label>
      <div id="aktivitetListe"></div>
      <button class="btn btn-secondary" onclick="leggTilAktivitet()" style="margin-top:6px;padding:8px 18px;font-size:0.85rem;">Legg til aktivitet</button>
    </div>

    <div class="form-gruppe">
      <label>Evaluering / Refleksjon (fyll inn etterpå)</label>
      <textarea id="evaluering" rows="3" placeholder="Hva fungerte godt? Hva ville vi gjort annerledes?"></textarea>
    </div>

    <div class="knapp-rad">
      <button class="btn btn-primary" onclick="genererPlan()">Generer periodeplan</button>
      <button class="btn btn-secondary" onclick="toemSkjema()">Tøm skjema</button>
    </div>
  </div>

  <div class="plan-preview" id="planPreview">
    <div class="preview-header">
      <div class="preview-tittel" id="prevTittel"></div>
      <div class="preview-meta" id="prevMeta"></div>
    </div>
    <div class="preview-seksjon">
      <h3>Overordnet mål</h3>
      <p id="prevMaal"></p>
    </div>
    <div class="preview-seksjon">
      <h3>Rammeplankoblinger</h3>
      <div class="ramme-tags" id="prevRamme"></div>
    </div>
    <div class="preview-seksjon">
      <h3>Planlagte aktiviteter</h3>
      <ul id="prevAkt"></ul>
    </div>
    <div class="preview-seksjon">
      <h3>Evaluering</h3>
      <p id="prevEval" style="color:#aaa;font-style:italic;"></p>
    </div>
    <div class="knapp-rad" style="margin-top:24px;">
      <button class="btn btn-accent" onclick="window.print()">Skriv ut periodeplan</button>
      <button class="btn btn-secondary" onclick="document.getElementById('planPreview').style.display='none'">Tilbake til skjema</button>
    </div>
  </div>
</div>
<footer>barnehagekassa.no &nbsp;·&nbsp; Gratis verktøy for barnehageansatte</footer>
<script>
const RAMME = [
  'Kommunikasjon, språk og tekst',
  'Kropp, bevegelse, mat og helse',
  'Kunst, kultur og kreativitet',
  'Natur, miljø og teknologi',
  'Antall, rom og form',
  'Etikk, religion og filosofi',
  'Nærmiljø og samfunn',
];

const rammeGrid = document.getElementById('rammeGrid');
RAMME.forEach((r, i) => {
  rammeGrid.innerHTML += `<label class="ramme-item"><input type="checkbox" value="${r}" id="r${i}"> ${r}</label>`;
});

let aktivitetTeller = 0;
function leggTilAktivitet() {
  aktivitetTeller++;
  const div = document.createElement('div');
  div.className = 'aktivitet-rad';
  div.id = 'akt' + aktivitetTeller;
  div.innerHTML = `<textarea placeholder="Beskriv aktiviteten..."></textarea><button class="fjern-btn" onclick="document.getElementById('akt${aktivitetTeller}').remove()">×</button>`;
  document.getElementById('aktivitetListe').appendChild(div);
}

leggTilAktivitet();
leggTilAktivitet();
leggTilAktivitet();

function genererPlan() {
  const tema = document.getElementById('tema').value || 'Uten tittel';
  const avd = document.getElementById('avdeling').value;
  const fra = document.getElementById('fraDato').value;
  const til = document.getElementById('tilDato').value;
  const maal = document.getElementById('maal').value || '(ikke utfylt)';
  const eval_ = document.getElementById('evaluering').value || '(fylles inn etter perioden)';

  const valgtRamme = [...document.querySelectorAll('#rammeGrid input:checked')].map(el => el.value);
  const aktiviteter = [...document.querySelectorAll('#aktivitetListe textarea')]
    .map(el => el.value.trim()).filter(v => v);

  document.getElementById('prevTittel').textContent = 'Periodeplan: ' + tema;
  document.getElementById('prevMeta').textContent = [avd, fra && til ? fra + ' – ' + til : fra || til].filter(Boolean).join(' · ');
  document.getElementById('prevMaal').textContent = maal;
  document.getElementById('prevRamme').innerHTML = valgtRamme.length ? valgtRamme.map(r => `<span class="ramme-tag">${r}</span>`).join('') : '<span style="color:#aaa">Ingen valgt</span>';
  document.getElementById('prevAkt').innerHTML = aktiviteter.length ? aktiviteter.map(a => `<li>${a}</li>`).join('') : '<li style="color:#aaa">Ingen lagt til</li>';
  document.getElementById('prevEval').textContent = eval_;

  const preview = document.getElementById('planPreview');
  preview.style.display = 'block';
  preview.scrollIntoView({behavior:'smooth'});
}

function toemSkjema() {
  if (!confirm('Tøm alle felt?')) return;
  ['tema','avdeling','fraDato','tilDato','maal','evaluering'].forEach(id => document.getElementById(id).value = '');
  document.querySelectorAll('#rammeGrid input').forEach(el => el.checked = false);
  document.getElementById('aktivitetListe').innerHTML = '';
  aktivitetTeller = 0;
  leggTilAktivitet(); leggTilAktivitet(); leggTilAktivitet();
  document.getElementById('planPreview').style.display = 'none';
}
</script>
</body></html>
