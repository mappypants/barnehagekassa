<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8">
  <link rel="icon" type="image/png" href="favicon.png">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Barnehage-bingo – barnehagekassa.no</title>

  <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', Arial, sans-serif; background: #f5f2ed; color: #1a1a1a; min-height: 100vh; }
    .site-header { background: white; padding: 14px 32px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid #e8e3db; }
    .site-header img { height: 44px; width: auto; display: block; }
    nav { display: flex; gap: 24px; align-items: center; }
    nav a { color: #444; text-decoration: none; font-size: 0.92rem; font-weight: 500; transition: color 0.15s; }
    nav a:hover { color: #3d7272; }
    .page-hero { background: #3d7272; color: white; padding: 52px 32px 44px; text-align: center; }
    .page-hero h1 { font-size: 2rem; font-weight: 900; font-family: 'Quicksand', 'Segoe UI', Arial, sans-serif; margin-bottom: 10px; }
    .page-hero p { color: rgba(255,255,255,0.90); font-size: 1rem; max-width: 520px; margin: 0 auto; line-height: 1.6; }
    .page { max-width: 860px; margin: 0 auto; padding: 40px 24px 80px; }
    .card { background: white; border-radius: 16px; border: 1px solid #e8e3db; padding: 28px; margin-bottom: 24px; }
    .btn { display: inline-block; padding: 11px 26px; border-radius: 100px; font-size: 0.92rem; font-weight: 700; border: none; cursor: pointer; transition: transform 0.15s, box-shadow 0.15s; text-decoration: none; }
    .btn-primary { background: #3d7272; color: white; }
    .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(61,114,114,0.25); }
    .btn-secondary { background: #f5f2ed; color: #3d7272; border: 1.5px solid #e8e3db; }
    .btn-secondary:hover { background: #e4f2f2; }
    .btn-accent { background: #d97035; color: white; }
    .btn-accent:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(217,112,53,0.25); }
    label { display: block; font-size: 0.82rem; font-weight: 700; color: #666; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px; }
    select, input[type=text], textarea { width: 100%; padding: 10px 14px; border: 1.5px solid #e8e3db; border-radius: 10px; font-size: 0.95rem; font-family: inherit; background: white; color: #1a1a1a; outline: none; transition: border-color 0.15s; }
    select:focus, input:focus, textarea:focus { border-color: #3d7272; }
    footer { text-align: center; padding: 28px; font-size: 0.8rem; color: #bbb; border-top: 1px solid #e8e3db; }
  </style>

  <style>
    @media print {
      .site-header, .page-hero, .kontroll, footer { display: none !important; }
      body { background: white; }
      .bingo-kort { box-shadow: none; border: 2px solid #3d7272; page-break-inside: avoid; }
    }
    .kategori-rad { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 24px; }
    .kat-btn { padding: 10px 20px; border-radius: 100px; border: 2px solid #e8e3db; background: white; font-size: 0.88rem; font-weight: 700; cursor: pointer; transition: all 0.15s; color: #444; }
    .kat-btn.aktiv { border-color: #3d7272; background: #e4f2f2; color: #2a5252; }
    .bingo-kort { background: white; border-radius: 16px; border: 1px solid #e8e3db; overflow: hidden; box-shadow: 0 2px 16px rgba(0,0,0,0.07); }
    .bingo-tittel { background: #3d7272; color: white; text-align: center; padding: 14px; font-size: 1.2rem; font-weight: 900; font-family: 'Quicksand','Segoe UI',Arial,sans-serif; letter-spacing: 2px; }
    .bingo-grid { display: grid; grid-template-columns: repeat(5,1fr); gap: 0; }
    .bingo-celle { border: 1px solid #e8e3db; padding: 12px 6px; text-align: center; font-size: 0.78rem; font-weight: 600; color: #333; cursor: pointer; transition: background 0.15s; min-height: 64px; display: flex; align-items: center; justify-content: center; line-height: 1.3; user-select: none; }
    .bingo-celle:hover { background: #f0f9f9; }
    .bingo-celle.merket { background: #3d7272; color: white; }
    .bingo-celle.fri { background: #d97035; color: white; font-weight: 900; pointer-events: none; }
    .kontroll { display: flex; gap: 12px; flex-wrap: wrap; margin-top: 20px; align-items: center; }
    .antall-kort { display: flex; align-items: center; gap: 10px; font-size: 0.88rem; color: #666; }
    .antall-kort input { width: 60px; text-align: center; }
    .alle-kort { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px,1fr)); gap: 20px; margin-top: 20px; }
  </style>
</head>
<body>
<div class="site-header">
    <a href="index.html"><img src="logo_cropped.png" alt="barnehagekassa logo"></a>
    <nav>
      <a href="index.html">Hjem</a>
      <a href="spesialpedagogikk.html">Spesialpedagogikk</a>
      <a href="barnehageressurser.html">Ressurser</a>
    </nav>
  </div>
<div class="page-hero">
  <h1>Barnehage-bingo</h1>
  <p>Generer tilfeldige bingokort for personalemøter, fagdager eller lek med barna. Merk av ruter direkte på skjermen eller skriv ut.</p>
</div>
<div class="page">
  <div class="card">
    <label>Kategori</label>
    <div class="kategori-rad" id="katRad"></div>
    <div class="kontroll">
      <div class="antall-kort">
        <span>Antall kort:</span>
        <input type="number" id="antallKort" value="1" min="1" max="6">
      </div>
      <button class="btn btn-primary" onclick="genererAlle()">Generer bingo</button>
      <button class="btn btn-secondary" onclick="window.print()">Skriv ut</button>
    </div>
  </div>
  <div class="alle-kort" id="alleKort"></div>
</div>
<footer>barnehagekassa.no &nbsp;·&nbsp; Gratis verktøy for barnehageansatte &nbsp;&middot;&nbsp; <span style="opacity:0.45">v0.9</span></footer>
<script>
const KATEGORIER = {
  'Personalmøte': [
    'Noen avbryter','Noen er på telefonen','PowerPoint med for liten tekst','Agenda som endres','Noen sier "kort møte"','Kaffe hentes midt i','Referat glemmes','Vi "tar det på mail"','Tidsplanen sprekker','Noen nikker og sover','AOB-punkt tar lengst','Videomøte med teknikaliteter','Noen starter med "Bare raskt..."','Pause som varer for lenge','Beslutning utsettes igjen','Noen sier "som vi sa sist"','To snakker samtidig','Ny informasjon på slutten','Ingen har lest sakene','Noen sier "egentlig..."','Møterommet er for kaldt','Noen er ikke varslet','Tavlen er ikke visket','Tema drifter vekk','Noen google noe midt i',
  ],
  'Barnehagejargon': [
    'Rammeplan','Fagområde','Dokumentasjon','Voksenrollen','Barnesyn','Medvirkning','Tilpasset opplæring','Relasjonskompetanse','Livsmestring','Progresjon','Systematisk arbeid','Tidlig innsats','Overgang SFO','Foreldresamarbeid','Inkludering','Psykososialt miljø','Danning','Hverdagssituasjoner','Læringsutbytte','Refleksjonspraksis','Observasjonsmetode','IUP','Tverrfaglig','Kompetanseplan','Satsningsområde',
  ],
  'Barnehagehverdagen': [
    'Noen vil ikke ha på seg støvler','Et barn gråter ved levering','Noen tisset på seg','Tøffelen er borte','Matboksen er glemt hjemme','Noen sier "det er urettferdig"','To barn vil ha samme ting','Noen vil ikke sove','Maling havner på feil sted','Noen faller og det er OK','Alle vil lese den samme boken','Noen vil ikke spise','Uteleken avbrytes av regn','Noen sier "stygge ord"','Hodehopp oppdaget','En klem som ikke ble bedt om','Puslespillbrikke mangler','Noen har feber ved henting','Lekebilen er under sofaen','Noen vil bare sitte i fanget','Uenighet om hvem som var "den"','Snegle observert og studert','Purring på skjema fra foreldre','Sandkasse-konflikt','Spontant tulleord-påfunn',
  ],
};

let valgtKat = Object.keys(KATEGORIER)[0];

const katRad = document.getElementById('katRad');
Object.keys(KATEGORIER).forEach(k => {
  const btn = document.createElement('button');
  btn.className = 'kat-btn' + (k === valgtKat ? ' aktiv' : '');
  btn.textContent = k;
  btn.onclick = () => {
    valgtKat = k;
    document.querySelectorAll('.kat-btn').forEach(b => b.classList.remove('aktiv'));
    btn.classList.add('aktiv');
  };
  katRad.appendChild(btn);
});

function lagKort() {
  const pool = [...KATEGORIER[valgtKat]];
  for (let i = pool.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i+1));
    [pool[i], pool[j]] = [pool[j], pool[i]];
  }
  const valgte = pool.slice(0, 24);
  valgte.splice(12, 0, 'GRATIS');

  const kort = document.createElement('div');
  kort.className = 'bingo-kort';
  kort.innerHTML = `<div class="bingo-tittel">B I N G O</div><div class="bingo-grid">${valgte.map((t,i) =>
    `<div class="bingo-celle${t==='GRATIS' ? ' fri' : ''}" onclick="this.classList.toggle('merket')">${t}</div>`
  ).join('')}</div>`;
  return kort;
}

function genererAlle() {
  const boks = document.getElementById('alleKort');
  boks.innerHTML = '';
  const n = parseInt(document.getElementById('antallKort').value) || 1;
  for (let i = 0; i < Math.min(n, 6); i++) {
    boks.appendChild(lagKort());
  }
  boks.scrollIntoView({behavior:'smooth'});
}

genererAlle();
</script>
</body></html>
