<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8">
  <link rel="icon" type="image/png" href="favicon.png">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Aktivitetsgenerator – barnehagekassa.no</title>

  <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', Arial, sans-serif; background: #f5f2ed; color: #1a1a1a; min-height: 100vh; }
    .site-header { background: white; padding: 14px 32px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid #e8e3db; }
    .site-header img { height: 44px; width: auto; display: block; }
    nav { display: flex; gap: 24px; align-items: center; }
    nav a { color: #444; text-decoration: none; font-size: 0.92rem; font-weight: 500; transition: color 0.15s; }
    nav a:hover { color: #3d7272; }
    .page-hero { background: #3d7272; color: white; padding: 52px 32px 44px; text-align: center; }
    .page-hero h1 { font-size: 2rem; font-weight: 900; font-family: 'Quicksand', 'Segoe UI', Arial, sans-serif; margin-bottom: 10px; }
    .page-hero p { color: rgba(255,255,255,0.90); font-size: 1rem; max-width: 520px; margin: 0 auto; line-height: 1.6; }
    .page { max-width: 860px; margin: 0 auto; padding: 40px 24px 80px; }
    .card { background: white; border-radius: 16px; border: 1px solid #e8e3db; padding: 28px; margin-bottom: 24px; }
    .btn { display: inline-block; padding: 11px 26px; border-radius: 100px; font-size: 0.92rem; font-weight: 700; border: none; cursor: pointer; transition: transform 0.15s, box-shadow 0.15s; text-decoration: none; }
    .btn-primary { background: #3d7272; color: white; }
    .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(61,114,114,0.25); }
    .btn-secondary { background: #f5f2ed; color: #3d7272; border: 1.5px solid #e8e3db; }
    .btn-secondary:hover { background: #e4f2f2; }
    .btn-accent { background: #d97035; color: white; }
    .btn-accent:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(217,112,53,0.25); }
    label { display: block; font-size: 0.82rem; font-weight: 700; color: #666; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px; }
    select, input[type=text], textarea { width: 100%; padding: 10px 14px; border: 1.5px solid #e8e3db; border-radius: 10px; font-size: 0.95rem; font-family: inherit; background: white; color: #1a1a1a; outline: none; transition: border-color 0.15s; }
    select:focus, input:focus, textarea:focus { border-color: #3d7272; }
    footer { text-align: center; padding: 28px; font-size: 0.8rem; color: #bbb; border-top: 1px solid #e8e3db; }
    @media (max-width: 600px) { .site-header { padding: 12px 16px; } nav { gap: 14px; } .page { padding: 24px 16px 60px; } }
  </style>

  <style>
    .filter-row { display: flex; gap: 14px; flex-wrap: wrap; margin-bottom: 24px; }
    .filter-row > div { flex: 1; min-width: 140px; }
    .result-box { display: none; background: #e4f2f2; border-radius: 16px; padding: 28px; margin-top: 28px; }
    .result-box.vis { display: block; }
    .result-title { font-size: 1.5rem; font-weight: 800; font-family: 'Quicksand','Segoe UI',Arial,sans-serif; color: #2a5252; margin-bottom: 12px; }
    .result-meta { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 16px; }
    .tag { display: inline-block; padding: 4px 12px; border-radius: 100px; font-size: 0.78rem; font-weight: 700; background: white; color: #3d7272; border: 1.5px solid #c0dede; }
    .result-desc { font-size: 0.97rem; line-height: 1.7; color: #333; margin-bottom: 16px; }
    .result-section { font-size: 0.8rem; font-weight: 700; color: #888; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; margin-top: 14px; }
    .result-list { list-style: none; padding: 0; }
    .result-list li { padding: 5px 0; font-size: 0.93rem; color: #444; border-bottom: 1px solid #c0dede; }
    .result-list li:last-child { border-bottom: none; }
    .rammeplan-tag { display: inline-block; margin: 3px 4px 3px 0; padding: 3px 10px; background: #3d7272; color: white; border-radius: 100px; font-size: 0.75rem; font-weight: 700; }
    .gen-btn-row { text-align: center; margin-top: 8px; }
  </style>
</head>
<body>
<div class="site-header">
    <a href="index.html"><img src="logo_cropped.png" alt="barnehagekassa logo"></a>
    <nav>
      <a href="index.html">Hjem</a>
      <a href="spesialpedagogikk.html">Spesialpedagogikk</a>
      <a href="barnehageressurser.html">Ressurser</a>
    </nav>
  </div>
<div class="page-hero">
  <h1>Aktivitetsgenerator</h1>
  <p>Hva skal vi gjøre i dag? Velg filtre og få et tilfeldig aktivitetsforslag tilpasset avdelingen din.</p>
</div>
<div class="page">
  <div class="card">
    <div class="filter-row">
      <div>
        <label>Årstid</label>
        <select id="arstid">
          <option value="alle">Alle årstider</option>
          <option value="vaar">Vår</option>
          <option value="sommer">Sommer</option>
          <option value="host">Høst</option>
          <option value="vinter">Vinter</option>
        </select>
      </div>
      <div>
        <label>Aldersgruppe</label>
        <select id="alder">
          <option value="alle">Alle aldre</option>
          <option value="liten">Liten avdeling (1–3 år)</option>
          <option value="stor">Stor avdeling (3–6 år)</option>
        </select>
      </div>
      <div>
        <label>Inne eller ute</label>
        <select id="sted">
          <option value="alle">Begge</option>
          <option value="inne">Inne</option>
          <option value="ute">Ute</option>
        </select>
      </div>
    </div>
    <div class="gen-btn-row">
      <button class="btn btn-primary" onclick="generer()" style="font-size:1rem;padding:14px 36px;">Finn aktivitet</button>
    </div>
    <div class="result-box" id="result">
      <div class="result-title" id="r-tittel"></div>
      <div class="result-meta" id="r-tags"></div>
      <div class="result-desc" id="r-desc"></div>
      <div class="result-section">Materiell</div>
      <ul class="result-list" id="r-materiell"></ul>
      <div class="result-section">Rammeplankobling</div>
      <div id="r-ramme"></div>
      <div style="text-align:center;margin-top:22px;">
        <button class="btn btn-secondary" onclick="generer()">Prøv en annen</button>
        <button class="btn btn-accent" onclick="window.print()" style="margin-left:10px;">Skriv ut</button>
      </div>
    </div>
  </div>
</div>
<footer>barnehagekassa.no &nbsp;·&nbsp; Gratis verktøy for barnehageansatte &nbsp;&middot;&nbsp; <span style="opacity:0.45">v0.9</span></footer>
<script>
const AKTIVITETER = [
  {tittel:"Leirforming",alder:["liten","stor"],sted:"inne",arstid:["alle"],desc:"Barn former fritt med leire eller modelleire. Fokus på haptisk utforsking, kreativt uttrykk og finmotorikk.",materiell:["Leire eller modelleire","Underlag / brettepapir","Verktøy: pinner, gafler, stein"],ramme:["Kunst, kultur og kreativitet","Kropp, bevegelse, mat og helse"]},
  {tittel:"Hinderløype inne",alder:["liten","stor"],sted:"inne",arstid:["alle"],desc:"Bygg en hinderløype med puter, matter, krakker og tau. Barna kravler, hopper, balanserer og klatrer gjennom banen.",materiell:["Madrasser og puter","Krakker og benker","Tau eller hoppesnor","Myke baller"],ramme:["Kropp, bevegelse, mat og helse"]},
  {tittel:"Naturobservasjon med lupe",alder:["stor"],sted:"ute",arstid:["vaar","sommer","host"],desc:"Ta med luper ut og la barna utforske det lille – insekter, bark, mose, steiner. Dokumenter med tegning eller bilder.",materiell:["Luper","Skissebøker og fargeblyanter","Poser til funn"],ramme:["Natur, miljø og teknologi","Antall, rom og form"]},
  {tittel:"Snøskulptur",alder:["liten","stor"],sted:"ute",arstid:["vinter"],desc:"Bygg og form fritt i snøen. Enkle skulpturer for de minste, mer avanserte former for de største. Snakk om hva som skjer når snøen pakkes.",materiell:["Spader og bøtter","Vann i kanne (packer snøen)","Gjenstander til pynt"],ramme:["Natur, miljø og teknologi","Kunst, kultur og kreativitet"]},
  {tittel:"Boklesing med dramatisering",alder:["liten","stor"],sted:"inne",arstid:["alle"],desc:"Les en bildebok høyt og dramatiser historien etterpå med rekvisitter eller kostyme. Barna kan ta roller selv eller bruke hånddukker.",materiell:["Bildebok","Hånddukker eller enkle kostymer","Rekvisitter fra historien"],ramme:["Kommunikasjon, språk og tekst","Kunst, kultur og kreativitet"]},
  {tittel:"Maling med store pensler",alder:["liten","stor"],sted:"inne",arstid:["alle"],desc:"Store ark på gulvet eller veggen, store pensler og fri bruk av farger. Fokus på prosessen, ikke resultatet. La barna blande farger selv.",materiell:["Store ark (tapetendsiden fungerer)","Fingermalingsmaling eller vanlig tempera","Store pensler og svamper"],ramme:["Kunst, kultur og kreativitet"]},
  {tittel:"Fuglemating og fugleobservasjon",alder:["liten","stor"],sted:"ute",arstid:["vinter","host"],desc:"Lag enkel fuglematebord av melkekartong, heng den opp og observer hvilke fugler som kommer. Tell og navngi fugler.",materiell:["Melkekartonger","Frø og fett","Fuglekikkert (om tilgjengelig)","Fuglebok for barn"],ramme:["Natur, miljø og teknologi","Antall, rom og form"]},
  {tittel:"Sangleker og regler",alder:["liten"],sted:"inne",arstid:["alle"],desc:"Fellessamling med kjente sangleker som 'Bjørnen sover', 'Hoppe, hoppe kavall' og 'Ro, ro til fiskeskjær'. Fokus på rytme, fellesskap og glede.",materiell:["Ingen materiell nødvendig","Eventuelt enkle rytmeinstrumenter"],ramme:["Kommunikasjon, språk og tekst","Kunst, kultur og kreativitet"]},
  {tittel:"Enkelt matlaging",alder:["stor"],sted:"inne",arstid:["alle"],desc:"Lag smoothie, grønnsakssuppe eller funnelkake sammen. Barna vasker, skjærer (trygg kniv) og blander. Snakk om ingrediensene og hvor maten kommer fra.",materiell:["Sesongens grønnsaker eller frukt","Enkel utstyr: skål, blender, kniv (barnevennlig)","Oppskriftskort i bilder"],ramme:["Kropp, bevegelse, mat og helse","Natur, miljø og teknologi"]},
  {tittel:"Konstruksjonslek med naturmaterialer",alder:["stor"],sted:"ute",arstid:["vaar","sommer","host"],desc:"Samle pinner, steiner, kongler og blader. Bygg hytter, skulpturer og mønstre. Utforsk hva som er stabilt og hva som faller.",materiell:["Naturmaterialer fra området","Tau for å binde pinner","Eventuelt noen enkle verktøy"],ramme:["Natur, miljø og teknologi","Antall, rom og form"]},
  {tittel:"Rytme og trommer",alder:["liten","stor"],sted:"inne",arstid:["alle"],desc:"Lag enkle trommer av bøtter og bokser. Spill rytmer sammen, gjenta mønstre og lag egne sanger. Utforsk ulike lyder.",materiell:["Bøtter, esker, gryter med lokk","Pinner eller blyanter som trommestikker"],ramme:["Kunst, kultur og kreativitet","Kommunikasjon, språk og tekst"]},
  {tittel:"Skattejakt ute",alder:["stor"],sted:"ute",arstid:["vaar","sommer","host"],desc:"Lag enkle skattekart eller bildeoppgaver som barna løser ute på lekeplassen. Samarbeid i par eller smågrupper.",materiell:["Skattekart (tegnet på forhånd)","Eventuell skatt (klistremerker, dippmix)"],ramme:["Etikk, religion og filosofi","Antall, rom og form"]},
  {tittel:"Iskuler og iseksperimenter",alder:["liten","stor"],sted:"ute",arstid:["vinter"],desc:"Fyll ballonger med vann og la dem fryse. Legg i fargestoff eller pynt. Ta ut av ballongen og undersøk iskulene. Hva skjer når de tiner?",materiell:["Ballonger","Vann","Spiselig fargestoff (valgfritt)"],ramme:["Natur, miljø og teknologi"]},
  {tittel:"Bokstav og tallspor i sand",alder:["stor"],sted:"inne",arstid:["alle"],desc:"Fyll brett med sand, salt eller semolina. Barna sporer bokstaver og tall med fingeren. En sensorisk og lekbasert tilnærming til skriving.",materiell:["Grunne brett","Sand, salt eller semolina","Bokstav- og tallkort til referanse"],ramme:["Kommunikasjon, språk og tekst","Antall, rom og form"]},
  {tittel:"Sansevandring ute",alder:["liten","stor"],sted:"ute",arstid:["vaar","sommer","host"],desc:"Gå sakte rundt på området og stopp for å bruke alle sansene: hva hører vi, hva lukter vi, hva kjenner vi med henda. Snakk underveis.",materiell:["Ingen materiell nødvendig","Eventuelt lupe og poser for funn"],ramme:["Natur, miljø og teknologi","Kropp, bevegelse, mat og helse"]},
  {tittel:"Bygge med klosser og dokumentere",alder:["liten","stor"],sted:"inne",arstid:["alle"],desc:"Fri konstruksjonslek med klosser. Dokumenter byggene med foto og lag en liten utstilling med barnenes egne forklaringer av hva de har bygget.",materiell:["Klosser (Lego, Duplo, treblokker)","Kamera eller nettbrett til foto"],ramme:["Antall, rom og form","Kunst, kultur og kreativitet"]},
  {tittel:"Gruppefortelling",alder:["stor"],sted:"inne",arstid:["alle"],desc:"Sett deg i ring. En starter en fortelling med én setning, neste fortsetter, og slik bygger gruppen historien together. Bruk eventuelt et bilde som startpunkt.",materiell:["Eventuelt bildekort som inspirasjon"],ramme:["Kommunikasjon, språk og tekst","Etikk, religion og filosofi"]},
  {tittel:"Vårens første naturtegning",alder:["stor"],sted:"ute",arstid:["vaar"],desc:"Ta med skissebøker ut og tegn det første tegnet på vår: krokus, knopper, fugler. Observer nøye og gjengi med blyant eller kull.",materiell:["Skissebøker","Blyanter og kull"],ramme:["Natur, miljø og teknologi","Kunst, kultur og kreativitet"]},
  {tittel:"Sansekasser",alder:["liten"],sted:"inne",arstid:["alle"],desc:"Fyll bokser med ulike materialer: ris, linser, sand, vannperler, pasta. La de minste grave, helle og utforske fritt. Fokus på sensorisk stimulering.",materiell:["Store bokser eller babypool","Ris, linser, sand, maisenna","Skjeer, kopper, traktere"],ramme:["Kropp, bevegelse, mat og helse","Natur, miljø og teknologi"]},
  {tittel:"Lys og skyggelek",alder:["liten","stor"],sted:"inne",arstid:["alle"],desc:"Mørk rom, en lommelykt og hender – lag skyggedyr på veggen. For de store: lag schattenteater med figurer av papir festet på pinner.",materiell:["Lommelykter","Mørkt rom","Papir og pinner til figurer (for de store)"],ramme:["Kunst, kultur og kreativitet","Kommunikasjon, språk og tekst"]},
];

function generer() {
  const arstid = document.getElementById('arstid').value;
  const alder = document.getElementById('alder').value;
  const sted = document.getElementById('sted').value;

  let filtrert = AKTIVITETER.filter(a => {
    const arstidOk = arstid === 'alle' || a.arstid.includes('alle') || a.arstid.includes(arstid);
    const alderOk = alder === 'alle' || a.alder.includes(alder);
    const stedOk = sted === 'alle' || a.sted === sted;
    return arstidOk && alderOk && stedOk;
  });

  if (filtrert.length === 0) {
    filtrert = AKTIVITETER;
  }

  const valgt = filtrert[Math.floor(Math.random() * filtrert.length)];

  document.getElementById('r-tittel').textContent = valgt.tittel;

  const tags = document.getElementById('r-tags');
  tags.innerHTML = '';
  valgt.alder.forEach(a => tags.innerHTML += `<span class="tag">${a === 'liten' ? '1–3 år' : '3–6 år'}</span>`);
  tags.innerHTML += `<span class="tag">${valgt.sted === 'inne' ? 'Inne' : valgt.sted === 'ute' ? 'Ute' : 'Inne / ute'}</span>`;
  valgt.arstid.forEach(s => {
    if (s !== 'alle') tags.innerHTML += `<span class="tag">${s.charAt(0).toUpperCase() + s.slice(1)}</span>`;
  });

  document.getElementById('r-desc').textContent = valgt.desc;

  const mat = document.getElementById('r-materiell');
  mat.innerHTML = valgt.materiell.map(m => `<li>${m}</li>`).join('');

  const ramme = document.getElementById('r-ramme');
  ramme.innerHTML = valgt.ramme.map(r => `<span class="rammeplan-tag">${r}</span>`).join('');

  document.getElementById('result').classList.add('vis');
  document.getElementById('result').scrollIntoView({behavior:'smooth', block:'nearest'});
}
</script>
</body></html>
