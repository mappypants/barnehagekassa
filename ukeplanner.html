<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8">
  <link rel="icon" type="image/png" href="favicon.png">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ukeplanner – barnehagekassa.no</title>

  <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', Arial, sans-serif; background: #f5f2ed; color: #1a1a1a; min-height: 100vh; }
    .site-header { background: white; padding: 14px 32px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid #e8e3db; }
    .site-header img { height: 44px; width: auto; display: block; }
    nav { display: flex; gap: 24px; align-items: center; }
    nav a { color: #444; text-decoration: none; font-size: 0.92rem; font-weight: 500; transition: color 0.15s; }
    nav a:hover { color: #3d7272; }
    .page-hero { background: #3d7272; color: white; padding: 52px 32px 44px; text-align: center; }
    .page-hero h1 { font-size: 2rem; font-weight: 900; font-family: 'Quicksand', 'Segoe UI', Arial, sans-serif; margin-bottom: 10px; }
    .page-hero p { color: rgba(255,255,255,0.90); font-size: 1rem; max-width: 520px; margin: 0 auto; line-height: 1.6; }
    .page { max-width: 860px; margin: 0 auto; padding: 40px 24px 80px; }
    .card { background: white; border-radius: 16px; border: 1px solid #e8e3db; padding: 28px; margin-bottom: 24px; }
    .btn { display: inline-block; padding: 11px 26px; border-radius: 100px; font-size: 0.92rem; font-weight: 700; border: none; cursor: pointer; transition: transform 0.15s, box-shadow 0.15s; text-decoration: none; }
    .btn-primary { background: #3d7272; color: white; }
    .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(61,114,114,0.25); }
    .btn-secondary { background: #f5f2ed; color: #3d7272; border: 1.5px solid #e8e3db; }
    .btn-secondary:hover { background: #e4f2f2; }
    .btn-accent { background: #d97035; color: white; }
    .btn-accent:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(217,112,53,0.25); }
    footer { text-align: center; padding: 28px; font-size: 0.8rem; color: #bbb; border-top: 1px solid #e8e3db; }
    @media (max-width: 600px) { .site-header { padding: 12px 16px; } nav { gap: 14px; } .page { padding: 24px 16px 60px; } }
  </style>

  <style>
    @media print {
      .site-header, .page-hero, nav, .print-knapp, footer { display: none !important; }
      body { background: white; }
      .plan-tabell { box-shadow: none; border: 1px solid #ccc; }
    }
    .plan-wrapper { overflow-x: auto; }
    .plan-tabell { width: 100%; border-collapse: collapse; background: white; border-radius: 16px; overflow: hidden; box-shadow: 0 2px 16px rgba(0,0,0,0.07); min-width: 600px; }
    .plan-tabell th { background: #3d7272; color: white; padding: 14px 10px; font-size: 0.88rem; font-weight: 700; text-align: center; }
    .plan-tabell th:first-child { background: #2a5252; width: 120px; }
    .plan-tabell td { border: 1px solid #e8e3db; vertical-align: top; padding: 0; }
    .plan-tabell td:first-child { background: #f5f2ed; font-size: 0.8rem; font-weight: 700; color: #888; text-transform: uppercase; letter-spacing: 0.4px; padding: 10px 12px; vertical-align: middle; text-align: right; }
    .celle-input { width: 100%; min-height: 64px; border: none; padding: 10px; font-size: 0.88rem; font-family: 'Segoe UI', Arial, sans-serif; resize: none; background: transparent; color: #1a1a1a; outline: none; }
    .celle-input:focus { background: #f0f9f9; }
    .uke-rad { display: flex; align-items: center; gap: 16px; margin-bottom: 20px; flex-wrap: wrap; }
    .uke-rad input[type=text] { max-width: 220px; }
    .uke-rad input[type=week] { max-width: 200px; padding: 9px 12px; border: 1.5px solid #e8e3db; border-radius: 10px; font-size: 0.93rem; font-family: inherit; outline: none; }
    .uke-rad input[type=week]:focus { border-color: #3d7272; }
    .print-knapp { display: flex; gap: 10px; margin-top: 20px; flex-wrap: wrap; }
    .teller { font-size: 0.78rem; color: #aaa; margin-top: 4px; }
  </style>
</head>
<body>
<div class="site-header">
    <a href="index.html"><img src="logo.png" alt="barnehagekassa logo"></a>
    <nav>
      <a href="index.html">Hjem</a>
      <a href="spesialpedagogikk.html">Spesialpedagogikk</a>
      <a href="barnehageressurser.html">Ressurser</a>
    </nav>
  </div>
<div class="page-hero">
  <h1>Ukeplanner</h1>
  <p>Fyll inn aktiviteter og fokus for hver dag i uken. Skriv ut ferdig plan og heng den opp på avdelingen.</p>
</div>
<div class="page">
  <div class="card">
    <div class="uke-rad">
      <div>
        <label>Avdeling</label>
        <input type="text" id="avdeling" placeholder="f.eks. Blåbær">
      </div>
      <div>
        <label>Uke</label>
        <input type="week" id="ukenr">
      </div>
      <div>
        <label>Tema for uken</label>
        <input type="text" id="tema" placeholder="f.eks. Vennskap">
      </div>
    </div>
  </div>
  <div class="plan-wrapper">
    <table class="plan-tabell" id="planTabell">
      <thead>
        <tr>
          <th></th>
          <th>Mandag</th>
          <th>Tirsdag</th>
          <th>Onsdag</th>
          <th>Torsdag</th>
          <th>Fredag</th>
        </tr>
      </thead>
      <tbody id="planBody"></tbody>
    </table>
  </div>
  <div class="print-knapp">
    <button class="btn btn-primary" onclick="window.print()">Skriv ut ukeplan</button>
    <button class="btn btn-secondary" onclick="toemPlan()">Tøm plan</button>
  </div>
</div>
<footer>barnehagekassa.no &nbsp;·&nbsp; Gratis verktøy for barnehageansatte</footer>
<script>
const RADER = [
  'Samling',
  'Frilek inne',
  'Aktivitet / prosjekt',
  'Utetid',
  'Måltid',
  'Hvile / ro',
  'Annet',
];

const tbody = document.getElementById('planBody');
const DAGER = ['mandag','tirsdag','onsdag','torsdag','fredag'];

function byggTabell() {
  tbody.innerHTML = '';
  RADER.forEach(rad => {
    const tr = document.createElement('tr');
    let html = `<td>${rad}</td>`;
    DAGER.forEach(dag => {
      const key = rad + '_' + dag;
      const lagret = localStorage.getItem ? (localStorage.getItem(key) || '') : '';
      html += `<td><textarea class="celle-input" data-key="${key}" placeholder="...">${lagret}</textarea></td>`;
    });
    tr.innerHTML = html;
    tbody.appendChild(tr);
  });

  document.querySelectorAll('.celle-input').forEach(el => {
    el.addEventListener('input', () => {
      try { localStorage.setItem(el.dataset.key, el.value); } catch(e) {}
    });
  });
}

function toemPlan() {
  if (!confirm('Tøm hele planen?')) return;
  document.querySelectorAll('.celle-input').forEach(el => {
    el.value = '';
    try { localStorage.removeItem(el.dataset.key); } catch(e) {}
  });
}

byggTabell();

// Set current week
const now = new Date();
const yr = now.getFullYear();
const startOfYear = new Date(yr, 0, 1);
const days = Math.floor((now - startOfYear) / 86400000);
const weekNum = Math.ceil((days + startOfYear.getDay() + 1) / 7);
const weekStr = yr + '-W' + String(weekNum).padStart(2,'0');
try { document.getElementById('ukenr').value = weekStr; } catch(e) {}
</script>
</body></html>
