const canvas = document.getElementById('hjul');
const ctx = canvas.getContext('2d');
const N = TEMAER.length;
const SLICE = (2 * Math.PI) / N;
let vinkel = 0;
let spinning = false;

function tegnHjul(rot) {
  const cx = canvas.width / 2, cy = canvas.height / 2, r = cx - 4;
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  TEMAER.forEach((t, i) => {
    const start = rot + i * SLICE;
    const end = start + SLICE;
    ctx.beginPath();
    ctx.moveTo(cx, cy);
    ctx.arc(cx, cy, r, start, end);
    ctx.closePath();
    ctx.fillStyle = t.farger;
    ctx.fill();
    ctx.strokeStyle = 'white';
    ctx.lineWidth = 1.5;
    ctx.stroke();
    ctx.save();
    ctx.translate(cx, cy);
    ctx.rotate(start + SLICE / 2);
    ctx.textAlign = 'right';
    const lys = ['#e4a890','#e4c4b0','#f5f2ed'];
    ctx.fillStyle = lys.includes(t.farger) ? '#2a5252' : 'white';
    const ord = t.tema.split(' ');
    const fs = Math.min(11, 100 / t.tema.length * 1.6);
    ctx.font = `bold ${fs}px 'Segoe UI', Arial`;
    ord.forEach((o, idx) => {
      ctx.fillText(o, r - 10, (idx - (ord.length-1)/2) * (fs + 3));
    });
    ctx.restore();
  });
  // Center circle
  ctx.beginPath();
  ctx.arc(cx, cy, 20, 0, 2*Math.PI);
  ctx.fillStyle = 'white';
  ctx.fill();
  ctx.strokeStyle = '#e8e3db';
  ctx.lineWidth = 2;
  ctx.stroke();
}

function spinHjul() {
  if (spinning) return;
  spinning = true;
  document.getElementById('resultatBoks').classList.remove('vis');
  const totalRot = (6 + Math.random() * 6) * 2 * Math.PI;
  const duration = 4000;
  const start = performance.now();
  const startVinkel = vinkel;
  function frame(now) {
    const elapsed = now - start;
    const t = Math.min(elapsed / duration, 1);
    const ease = 1 - Math.pow(1 - t, 3);
    vinkel = startVinkel + totalRot * ease;
    tegnHjul(vinkel);
    if (t < 1) {
      requestAnimationFrame(frame);
    } else {
      spinning = false;
      const norm = ((-vinkel % (2*Math.PI)) + 2*Math.PI) % (2*Math.PI);
      const idx = Math.floor(norm / SLICE) % N;
      const valgt = TEMAER[idx];
      document.getElementById('resTema').textContent = valgt.tema;
      document.getElementById('resKortbeskrivelse').textContent = valgt.kortbeskrivelse;
      document.getElementById('resDesc').textContent = valgt.desc;
      const ul = document.getElementById('resSporsmal');
      ul.innerHTML = valgt.sporsmal.map(s => `<li>${s}</li>`).join('');
      document.getElementById('resultatBoks').classList.add('vis');
    }
  }
  requestAnimationFrame(frame);
}

tegnHjul(0);
</script>
