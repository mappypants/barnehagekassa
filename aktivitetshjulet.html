<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8">
  <link rel="icon" type="image/png" href="favicon.png">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Aktivitetshjulet – barnehagekassa.no</title>

  <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', Arial, sans-serif; background: #f5f2ed; color: #1a1a1a; min-height: 100vh; }
    .site-header { background: white; padding: 14px 32px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid #e8e3db; }
    .site-header img { height: 44px; width: auto; display: block; }
    nav { display: flex; gap: 24px; align-items: center; }
    nav a { color: #444; text-decoration: none; font-size: 0.92rem; font-weight: 500; transition: color 0.15s; }
    nav a:hover { color: #3d7272; }
    .page-hero { background: #3d7272; color: white; padding: 52px 32px 44px; text-align: center; }
    .page-hero h1 { font-size: 2rem; font-weight: 900; font-family: 'Quicksand', 'Segoe UI', Arial, sans-serif; margin-bottom: 10px; }
    .page-hero p { color: rgba(255,255,255,0.90); font-size: 1rem; max-width: 520px; margin: 0 auto; line-height: 1.6; }
    .page { max-width: 860px; margin: 0 auto; padding: 40px 24px 80px; }
    .card { background: white; border-radius: 16px; border: 1px solid #e8e3db; padding: 28px; margin-bottom: 24px; }
    .btn { display: inline-block; padding: 11px 26px; border-radius: 100px; font-size: 0.92rem; font-weight: 700; border: none; cursor: pointer; transition: transform 0.15s, box-shadow 0.15s; text-decoration: none; }
    .btn-primary { background: #3d7272; color: white; }
    .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(61,114,114,0.25); }
    .btn-secondary { background: #f5f2ed; color: #3d7272; border: 1.5px solid #e8e3db; }
    .btn-secondary:hover { background: #e4f2f2; }
    .btn-accent { background: #d97035; color: white; }
    .btn-accent:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(217,112,53,0.25); }
    footer { text-align: center; padding: 28px; font-size: 0.8rem; color: #bbb; border-top: 1px solid #e8e3db; }
    @media (max-width: 600px) { .site-header { padding: 12px 16px; } nav { gap: 14px; } .page { padding: 24px 16px 60px; } }
  </style>

  <style>
    .hjul-wrapper { display: flex; flex-direction: column; align-items: center; gap: 28px; padding: 20px 0; }
    canvas { border-radius: 50%; box-shadow: 0 8px 32px rgba(61,114,114,0.2); cursor: pointer; max-width: 340px; width: 100%; }
    .peker { font-size: 2rem; line-height: 1; color: #d97035; }
    .resultat-boks { display: none; background: #e4f2f2; border-radius: 16px; padding: 24px; width: 100%; max-width: 500px; text-align: center; }
    .resultat-boks.vis { display: block; }
    .res-kategori { font-size: 1.3rem; font-weight: 900; font-family: 'Quicksand','Segoe UI',Arial,sans-serif; color: #2a5252; margin-bottom: 10px; }
    .res-forslag { font-size: 0.93rem; color: #444; line-height: 1.7; }
    .spin-btn { margin-top: 4px; }
  </style>
</head>
<body>
<div class="site-header">
    <a href="index.html"><img src="logo.png" alt="barnehagekassa logo"></a>
    <nav>
      <a href="index.html">Hjem</a>
      <a href="spesialpedagogikk.html">Spesialpedagogikk</a>
      <a href="barnehageressurser.html">Ressurser</a>
    </nav>
  </div>
<div class="page-hero">
  <h1>Aktivitetshjulet</h1>
  <p>Spin hjulet og la tilfeldighetene bestemme hva avdelingen fokuserer på i dag. Perfekt for avdelingsmøter og mandagsplanlegging.</p>
</div>
<div class="page">
  <div class="card">
    <div class="hjul-wrapper">
      <div class="peker">▼</div>
      <canvas id="hjul" width="340" height="340" onclick="spinHjul()"></canvas>
      <button class="btn btn-primary spin-btn" onclick="spinHjul()">Spin hjulet</button>
      <div class="resultat-boks" id="resultatBoks">
        <div class="res-kategori" id="resKat"></div>
        <div class="res-forslag" id="resForslag"></div>
      </div>
    </div>
  </div>
</div>
<footer>barnehagekassa.no &nbsp;·&nbsp; Gratis verktøy for barnehageansatte</footer>
<script>
const SEGMENTER = [
  { navn: 'Kunst og forming', farge: '#e4a890', forslag: 'Mal, tegn, form med leire eller lag collage. La barna uttrykke seg fritt med materialer de velger selv.' },
  { navn: 'Musikk og rytme', farge: '#3d7272', forslag: 'Lag rytmer med kroppen eller enkle instrumenter. Syng kjente sanger eller finn på nye.' },
  { navn: 'Natur og ute', farge: '#4ab4b4', forslag: 'Ta med barna ut og utforsk det nærmeste. Samle, observere, leke med det naturen gir.' },
  { navn: 'Språk og fortelling', farge: '#d97035', forslag: 'Les en bok høyt, fortell en felles historie eller la barna dramatisere et eventyr.' },
  { navn: 'Kropp og bevegelse', farge: '#2a5252', forslag: 'Hinderløype, dans, bevegelsesleker eller yoga for barn. Fokus på gleden ved å bruke kroppen.' },
  { navn: 'Matte og logikk', farge: '#e4c4b0', forslag: 'Tell, sorter, bygg mønstre eller finn former ute og inne. Gjør matte til lek.' },
  { navn: 'Drama og lek', farge: '#548484', forslag: 'Rollelek, fingerdukker, klosselek eller fri dramatisering. Gi barna rom til å skape egne verdener.' },
  { navn: 'Fri lek', farge: '#f5f2ed', forslag: 'Sett frem materiell, trekk deg tilbake og la barna lede. Observer og dokumenter hva som skjer.' },
];

const canvas = document.getElementById('hjul');
const ctx = canvas.getContext('2d');
const N = SEGMENTER.length;
const SLICE = (2 * Math.PI) / N;
let vinkel = 0;
let spinner = null;
let spinning = false;

function tegnHjul(rot) {
  const cx = canvas.width / 2, cy = canvas.height / 2, r = cx - 4;
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  SEGMENTER.forEach((seg, i) => {
    const start = rot + i * SLICE;
    const end = start + SLICE;
    ctx.beginPath();
    ctx.moveTo(cx, cy);
    ctx.arc(cx, cy, r, start, end);
    ctx.closePath();
    ctx.fillStyle = seg.farge;
    ctx.fill();
    ctx.strokeStyle = 'white';
    ctx.lineWidth = 2;
    ctx.stroke();
    ctx.save();
    ctx.translate(cx, cy);
    ctx.rotate(start + SLICE / 2);
    ctx.textAlign = 'right';
    ctx.fillStyle = (seg.farge === '#f5f2ed' || seg.farge === '#e4c4b0') ? '#2a5252' : 'white';
    ctx.font = `bold ${Math.min(13, 120 / seg.navn.length)}px 'Segoe UI', Arial`;
    const ord = seg.navn.split(' ');
    ord.forEach((o, idx) => {
      ctx.fillText(o, r - 14, (idx - (ord.length-1)/2) * 16);
    });
    ctx.restore();
  });
  ctx.beginPath();
  ctx.arc(cx, cy, 22, 0, 2*Math.PI);
  ctx.fillStyle = 'white';
  ctx.fill();
  ctx.strokeStyle = '#e8e3db';
  ctx.lineWidth = 2;
  ctx.stroke();
}

function spinHjul() {
  if (spinning) return;
  spinning = true;
  document.getElementById('resultatBoks').classList.remove('vis');
  const totalRot = (5 + Math.random() * 5) * 2 * Math.PI;
  const duration = 3500;
  const start = performance.now();
  const startVinkel = vinkel;
  function frame(now) {
    const elapsed = now - start;
    const t = Math.min(elapsed / duration, 1);
    const ease = 1 - Math.pow(1 - t, 3);
    vinkel = startVinkel + totalRot * ease;
    tegnHjul(vinkel);
    if (t < 1) { requestAnimationFrame(frame); }
    else {
      spinning = false;
      const normalisert = ((-vinkel % (2*Math.PI)) + 2*Math.PI) % (2*Math.PI);
      const idx = Math.floor(normalisert / SLICE) % N;
      const valgt = SEGMENTER[idx];
      document.getElementById('resKat').textContent = valgt.navn;
      document.getElementById('resForslag').textContent = valgt.forslag;
      document.getElementById('resultatBoks').classList.add('vis');
    }
  }
  requestAnimationFrame(frame);
}

tegnHjul(0);
</script>
</body></html>
